<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTML Audio and Video Lab</title>
</head>
<body>
  <h1>Relaxing Rainy Day Page</h1>
  <section>
    <h2>The Last Phone Booth</h2>
    <video controls width="640" autoplay>
      <source src="the-last-phone-booth.mp4" type="video/mp4">
    </video>
  </section>
  <section>
    <h2>Signal in the Rain</h2>
    <audio controls loop src="signal-in-the-rain.mp3" type="audio/mp4" autoplay>
    </audio>
  </section>
</body>
</html>>
