<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>DevOps Deployment Checklist</h1>
    <ul class="todo-list">
        <li>
            <input type="checkbox" id="config-linux">
            <label for="config-linux">Configure the Linux server</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" target=_blank href="google.com">View server setup guide</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="create-users">
            <label for="create-users">Create user accounts and permissions</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" target=_blank href="google.com">Review access controls</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="ci-cd">
            <label for="ci-cd">Set up a CI/CD pipeline</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" target=_blank href="google.com">Open pipeline instructions</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="monitor-backup">
            <label for="monitor-backup">Configure monitoring and backups</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" target=_blank href="google.com">Check monitoring tools</a>
                </li>
            </ul>
        </li>
         <li>
            <input type="checkbox" id="test-deploy">
            <label for="test-deploy">Test and deploy the application</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" target=_blank href="google.com">View deployment steps</a>
                </li>
            </ul>
        </li>
    </ul>
</body>

</html>
