<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blog-post-card">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" alt="server rack with lights flashing and cables">
    </div>
        <div class="post-content">
            <h2 class="post-title">Midnight Server Room</h2>
            <p class="post-excerpt">A behind-the-scenes look at backups, testing, monitoring, and the tense moments before pushing an update live.</p>
            <a class="read-more" href="google.com" target="_blank">Read More</a>
        </div>
</body>
</html>
